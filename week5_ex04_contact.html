<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
    />
    <title>Furget About It ✦ Contact</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="week5_ex04_index.html"
          >✦ FURGET ABOUT IT ✦</a
        >
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="week5_ex04_index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="week5_ex04_products.html">Collection</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="week5_ex04_contact.html"
                >Contact</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="week5_ex04_about.html">About</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-4 flex-grow-1">
      <div class="row">
        <div class="col-lg-8 mx-auto" data-aos="fade-up">
          <h1 class="mb-4 text-center">Contact Us</h1>

          <div class="card shadow-sm border-0">
            <div class="card-body p-4">
              <form>
                <div class="mb-3">
                  <label class="form-label">Full name</label>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="e.g., Victoria Adams"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Email address</label>
                  <input
                    type="email"
                    class="form-control"
                    placeholder="client@email.com"
                  />
                </div>
                <div class="mb-3">
                  <label class="form-label">Subject</label>
                  <select class="form-select">
                    <option>Custom order</option>
                    <option>Showroom appointment</option>
                    <option>General inquiry</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Message</label>
                  <textarea
                    class="form-control"
                    rows="5"
                    placeholder="Type here..."
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2">
                  Send Message
                </button>
                <p class="text-muted small text-center mt-3">
                  📞 (+27) 12 345 6789
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white-50 text-center py-4 mt-auto">
      <div class="container">
        <small>© 2026 Furget About It — Couture Fur Atelier</small>
      </div>
    </footer>

    <!-- necessary scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- activate the AOS -->
    <script>
      AOS.init({ duration: 700, once: true });
    </script>
  </body>
</html>
